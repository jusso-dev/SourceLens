name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DATABASE_URL: postgresql://sourcelens:sourcelens@localhost:5432/sourcelens
      REDIS_URL: redis://localhost:6379
      BETTER_AUTH_SECRET: ci-secret-must-be-at-least-32-characters-long
      BETTER_AUTH_URL: http://localhost:3001
      STORAGE_DIR: ./storage
      OLLAMA_HOST: http://invalid-host.invalid:11434
      OLLAMA_CHAT_MODEL: gemma3:4b
      OLLAMA_EMBED_MODEL: nomic-embed-text
      EMBEDDING_DIM: "768"
      MAX_UPLOAD_BYTES: "26214400"
      ANTHROPIC_API_KEY: ""
      PORT: "3001"
      CI: "true"

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: sourcelens
          POSTGRES_PASSWORD: sourcelens
          POSTGRES_DB: sourcelens
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sourcelens"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm exec prisma generate

      - name: Apply schema and indexes
        run: pnpm db:push && pnpm db:post

      - name: Install Playwright browsers
        run: pnpm test:e2e:install

      - name: Run Playwright tests
        run: pnpm test:e2e

      - name: Upload trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
