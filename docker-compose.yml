services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: sourcelens
      POSTGRES_PASSWORD: sourcelens
      POSTGRES_DB: sourcelens
    ports:
      - "5432:5432"
    volumes:
      - sl_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sourcelens"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - sl_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - sl_ollama:/root/.ollama

  minio:
    image: minio/minio:latest
    profiles: ["s3"]
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: sourcelens
      MINIO_ROOT_PASSWORD: sourcelens-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - sl_minio:/data

  minio-create-bucket:
    image: minio/mc:latest
    profiles: ["s3"]
    depends_on:
      - minio
    entrypoint:
      [
        "sh",
        "-c",
        "until mc alias set local http://minio:9000 sourcelens sourcelens-secret; do sleep 1; done; mc mb --ignore-existing local/sourcelens",
      ]

volumes:
  sl_pg:
  sl_redis:
  sl_ollama:
  sl_minio:
